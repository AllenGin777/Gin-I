<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: #fdfaf5; color: #333; min-height: 100vh; -webkit-font-smoothing: antialiased;
  }
  .page { max-width: 480px; margin: 0 auto; padding-bottom: 50px; }
  .hero { text-align: center; padding: 56px 24px 36px; }
  .hero .icon-home { font-size: 52px; display: block; margin-bottom: 14px; }
  .hero h1 { font-size: 28px; font-weight: 600; letter-spacing: 3px; color: #4a3728; margin-bottom: 6px; }
  .hero .subtitle { font-size: 13px; color: #b8a698; letter-spacing: 6px; }
  .divider { width: 36px; height: 2px; background: #c8b6a6; margin: 18px auto 0; }
  .card { margin: 0 20px 18px; background: #fff; border-radius: 14px; padding: 26px 22px; box-shadow: 0 2px 20px rgba(0,0,0,.04); }
  .info-row { display: flex; align-items: flex-start; padding: 12px 0; border-bottom: 1px solid #f2ece4; }
  .info-row:last-child { border-bottom: none; }
  .info-icon { width: 42px; height: 42px; background: #f8f3ed; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 19px; flex-shrink: 0; margin-right: 14px; }
  .info-text h3 { font-size: 12px; color: #b8a698; font-weight: 500; margin-bottom: 3px; letter-spacing: 1px; }
  .info-text p { font-size: 16px; color: #3d3226; font-weight: 500; }
  .info-text .small { font-size: 13px; color: #8c7e72; }
  .message-card { margin: 0 20px 18px; background: #fff; border-radius: 14px; padding: 26px 22px; box-shadow: 0 2px 20px rgba(0,0,0,.04); text-align: center; }
  .message-card p { font-size: 15px; line-height: 1.9; color: #5c4f44; }
  .message-card .sign { margin-top: 14px; font-size: 13px; color: #b8a698; }

  .map-section { margin: 0 20px 18px; }
  .map-section h3 { font-size: 15px; color: #4a3728; margin-bottom: 10px; font-weight: 600; }
  .map-img-wrap {
    position: relative; width: 100%; border-radius: 14px; overflow: hidden;
    box-shadow: 0 2px 16px rgba(0,0,0,.05); cursor: pointer; background: #e8e4df;
  }
  .map-img-wrap img { width: 100%; display: block; }
  .map-img-wrap::after {
    content: '👆 点我导航';
    position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
    background: rgba(255,255,255,.92); color: #4a3728; font-size: 13px;
    padding: 6px 16px; border-radius: 20px; pointer-events: none;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
  }
  .nav-btn-group { display: flex; gap: 10px; margin-top: 12px; }
  .nav-btn {
    flex: 1; padding: 15px 0; border: none; border-radius: 12px;
    font-size: 16px; font-weight: 600; letter-spacing: 1px; cursor: pointer;
    text-align: center; color: #fff; background: #4a3728;
    box-shadow: 0 4px 12px rgba(74,55,40,.18); transition: transform .15s;
    -webkit-appearance: none; font-family: inherit;
  }
  .nav-btn:active { transform: scale(.97); }
  .nav-btn.secondary { background: #f8f3ed; color: #4a3728; box-shadow: none; }
  .rsvp-section { margin: 0 20px 18px; text-align: center; }
  .rsvp-section p.lead { font-size: 15px; color: #4a3728; margin-bottom: 14px; }
  .contact-row { display: flex; justify-content: center; gap: 24px; }
  .contact-item {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    text-decoration: none; color: #5c4f44; cursor: pointer; border: none;
    background: none; font-family: inherit; padding: 0;
  }
  .contact-dot {
    width: 44px; height: 44px; border-radius: 50%; background: #f8f3ed;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .contact-dot:active { background: #e8e0d6; }
  .contact-item span { font-size: 12px; color: #999; }
  .wechat-hint { margin-top: 12px; font-size: 13px; color: #e07b5a; min-height: 20px; transition: opacity .3s; }
  .footer { text-align: center; padding: 30px 20px; color: #d5cec6; font-size: 12px; letter-spacing: 2px; }
  @media (max-width: 360px) {
    .hero { padding: 40px 16px 28px; }
    .hero h1 { font-size: 24px; }
    .card, .message-card { padding: 18px 14px; margin: 0 12px 14px; }
    .info-text p { font-size: 15px; }
    .nav-btn-group { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="hero">
    <span class="icon-home">🏠</span>
    <h1>诚邀莅临寒舍</h1>
    <p class="subtitle">乔 迁 之 喜</p>
    <div class="divider"></div>
  </div>

  <div class="card">
    <div class="info-row">
      <div class="info-icon">📅</div>
      <div class="info-text"><h3>时 间</h3><p>2026年6月13日（周六）</p><p class="small">17:30</p></div>
    </div>
    <div class="info-row">
      <div class="info-icon">📍</div>
      <div class="info-text"><h3>地 点</h3><p>大华启宸府</p><p class="small">北京市昌平区</p></div>
    </div>
    <div class="info-row">
      <div class="info-icon">🎉</div>
      <div class="info-text"><h3>主 题</h3><p>新家暖房 · 好友小聚</p><p class="small">吃吃喝喝，随意自在</p></div>
    </div>
  </div>

  <div class="message-card">
    <p>「新居落定，想请朋友们来坐坐。<br>不必带礼，人来就好。」</p>
    <div class="sign">— 疾风敬邀</div>
  </div>

  <div class="map-section">
    <h3>🗺 精准定位</h3>
    <div class="map-img-wrap" id="mapWrap">
      <img src="https://apis.map.qq.com/ws/staticmap/v2/?center=116.307205,40.102299&zoom=17&size=600*300&markers=size:large|color:red|116.307205,40.102299&key=OB4BZ-D4W3U-B7VVO-4PJWW-6TKDJ-WPB77" alt="大华启宸府定位地图" id="mapImg">
    </div>
    <div class="nav-btn-group">
      <button class="nav-btn" id="navBtn">🚗 打开导航</button>
    </div>
    <div class="nav-btn-group" style="margin-top:8px;">
      <button class="nav-btn secondary" id="copyBtn">📋 复制地址</button>
      <button class="nav-btn secondary" id="gaodeBtn">🗺 用高德地图</button>
    </div>
  </div>

  <div class="rsvp-section">
    <p class="lead">🎈 能否赏光？</p>
    <div class="contact-row">
      <button class="contact-item" id="wechatBtn">
        <div class="contact-dot">💬</div>
        <span>微信我</span>
      </button>
      <a class="contact-item" href="tel:17602068836">
        <div class="contact-dot">📞</div>
        <span>17602068836</span>
      </a>
    </div>
    <p class="wechat-hint" id="wechatHint"></p>
  </div>

  <div class="footer">期待你的到来 🥂</div>

</div>

<script>
(function() {
  var ADDR = '北京市昌平区大华启宸府';
  var WECHAT_ID = '疾风';
  var LAT = 40.102299, LNG = 116.307205;

  function isMobile() { return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent); }
  function isWechat() { return /MicroMessenger/i.test(navigator.userAgent); }

  // === 点地图打开导航 ===
  document.getElementById('mapWrap').addEventListener('click', doNavigate);

  // === 按钮 ===
  document.getElementById('navBtn').addEventListener('click', doNavigate);
  document.getElementById('gaodeBtn').addEventListener('click', function() { doNavigate('gaode'); });

  function doNavigate(use) {
    if (!isMobile()) {
      // 桌面：打开腾讯地图网页版，带精准标记
      window.open('https://map.qq.com/?type=marker&isopeninfowin=1&markertype=1&pointx=' + LNG + '&pointy=' + LAT + '&name=' + encodeURIComponent(ADDR) + '&addr=' + encodeURIComponent(ADDR) + '&ref=invitation', '_blank');
      return;
    }
    if (use === 'gaode') {
      window.location.href = 'https://uri.amap.com/navigation?to=' + LNG + ',' + LAT + ',大华启宸府&callnative=1&mode=car';
      return;
    }
    if (!isWechat() && /iPhone|iPad/i.test(navigator.userAgent)) {
      window.location.href = 'http://maps.apple.com/?ll=' + LAT + ',' + LNG + '&q=' + encodeURIComponent(ADDR);
      return;
    }
    // 微信 / Android：腾讯地图 App
    window.location.href = 'https://apis.map.qq.com/uri/v1/marker?marker=coord:' + LAT + ',' + LNG + ';title:' + encodeURIComponent(ADDR) + ';addr:' + encodeURIComponent(ADDR) + '&referer=invitation';
  }

  // === 复制地址 ===
  document.getElementById('copyBtn').addEventListener('click', function() {
    copyText(ADDR, '✅ 地址已复制：' + ADDR);
  });

  // === 微信 ===
  document.getElementById('wechatBtn').addEventListener('click', function() {
    copyText(WECHAT_ID, '✅ 微信号「' + WECHAT_ID + '」已复制，打开微信添加我吧');
  });

  function copyText(text, okMsg) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() { showHint(okMsg); }).catch(function() { fallbackCopy(text, okMsg); });
    } else { fallbackCopy(text, okMsg); }
  }
  function fallbackCopy(text, okMsg) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); showHint(okMsg); } catch(e) { showHint('📋 请长按复制：' + text); }
    document.body.removeChild(ta);
  }

  var hintTimer;
  function showHint(msg) {
    var el = document.getElementById('wechatHint');
    el.textContent = msg;
    el.style.opacity = '1';
    clearTimeout(hintTimer);
    hintTimer = setTimeout(function() { el.style.opacity = '0'; }, 3000);
  }
})();
</script>
</body>
</html>
